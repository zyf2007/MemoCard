<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>LaTeX to SVG 转换器</title>
    <script>
        window.MathJax = {
            svg: {
                fontCache: 'none',  // 禁用字体缓存，嵌入实际路径
                scale: 1.2
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 100px; font-family: monospace; }
        #preview { border: 1px solid #ccc; padding: 20px; margin: 10px 0; min-height: 50px; background: white; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>LaTeX to SVG 转换器</h2>
    
    <textarea id="input" placeholder="输入 LaTeX，例如: $E=mc^2$">$$\sum_{n=1}^{\infty} \frac{1}{n^2} = \frac{\pi^2}{6}$$</textarea>
    <br>
    <button onclick="render()">渲染</button>
    <button onclick="download()" id="dlBtn" disabled>下载 SVG</button>
    
    <h3>预览:</h3>
    <div id="preview"></div>

    <script>
        let currentSVG = null;

        async function render() {
            const tex = document.getElementById('input').value;
            const preview = document.getElementById('preview');
            
            try {
                // 使用 MathJax 渲染
                const node = await MathJax.tex2svgPromise(tex, {display: true});
                const svg = node.querySelector('svg');
                
                // 关键修复：将 currentColor 替换为 black，确保下载后可见
                let svgHTML = svg.outerHTML;
                svgHTML = svgHTML.replace(/currentColor/g, 'black');
                
                // 更新预览（使用修改后的版本）
                preview.innerHTML = svgHTML;
                currentSVG = svgHTML;
                
                document.getElementById('dlBtn').disabled = false;
            } catch (err) {
                preview.innerHTML = '<span style="color:red">错误: ' + err.message + '</span>';
            }
        }

        function download() {
            if (!currentSVG) return;
            
            // 添加 XML 头和注释
            const fullSVG = `<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n<!-- Created with MathJax -->\n${currentSVG}`;
            
            const blob = new Blob([fullSVG], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'math-formula.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 初始渲染示例
        window.onload = render;
    </script>
</body>
</html>
